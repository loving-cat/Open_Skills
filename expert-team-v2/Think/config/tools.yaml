# 工具规范配置
# 定义各类工具的使用场景和注意事项

tools:
  # ==================== 代码编辑工具 ====================
  edit_tools:
    Edit:
      name: replace_in_file
      description: 修改现有代码
      usage:
        - 必须先 Read 确认上下文
        - 单次修改范围控制在 50 行以内
        - 修改后必须验证语法正确性
      example: |
        Edit({
          file_path: "absolute/path/to/file",
          old_string: "原始内容",
          new_string: "新内容"
        })
      warnings:
        - 严禁批量替换未经确认的内容
        - 避免替换冲突

    Write:
      name: write_to_file
      description: 创建新文件
      usage:
        - 确保父目录存在
        - 路径使用绝对路径
        - 先 Read 确认文件不存在或需要覆盖
      example: |
        Write({
          file_path: "absolute/path/to/new/file",
          content: "文件内容"
        })

    Read:
      name: read_file
      description: 读取代码/配置
      usage:
        - 修改前必须读取
        - 搜索后必须读取匹配文件
        - 支持分页读取大文件

  # ==================== 搜索工具 ====================
  search_tools:
    Grep:
      name: search_content
      description: 查找代码逻辑、函数定义
      usage:
        - 优先使用，支持正则
        - 结果精确
        - 可指定文件类型过滤
      example: |
        Grep({
          pattern: "function\\s+\\w+",
          type: "js",
          output_mode: "content"
        })

    Glob:
      name: search_file
      description: 按文件名模式查找
      usage:
        - 找配置文件
        - 特定类型文件
        - 支持通配符
      example: |
        Glob({
          pattern: "**/*.config.js"
        })

  # ==================== 命令执行工具 ====================
  command_tools:
    Bash:
      name: execute_command
      description: 编译、测试、运行脚本
      usage:
        - 危险操作需要用户确认
        - 支持后台运行
      dangerous_operations:
        - 删除文件/目录 (rm, rmdir, del)
        - 修改系统配置
        - 网络请求命令
        - 涉及用户数据的写入操作
      forbidden_operations:
        - 任何下载并执行未知脚本的操作
        - 修改系统环境变量（除非用户明确要求）
        - 访问项目目录外的敏感文件

  # ==================== 任务管理工具 ====================
  task_tools:
    TaskCreate:
      description: 创建任务清单
      usage:
        - merge: true 必须设置，保留已有任务
      example: |
        TaskCreate({
          subject: "任务标题",
          description: "详细描述"
        })

    TaskUpdate:
      description: 更新任务状态
      status_values:
        - in_progress: 当前正在执行（同一时间只能有一个）
        - pending: 等待执行
        - completed: 已完成并通过验证
        - blocked: 遇到疑难，需要增援
      example: |
        TaskUpdate({
          taskId: "1",
          status: "in_progress"
        })

# ==================== 工具使用原则 ====================
principles:
  - 工具选择优先级: 专用工具 > Bash 命令
  - 修改前必须读取
  - 搜索结果超过 10 个时优化搜索词
  - 找到目标后必须读取完整上下文
  - 危险操作必须确认
